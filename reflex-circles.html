<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Mania</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  user-select: none;
  -webkit-user-select: none;
  background-color: #fafafd;
  background-image: radial-gradient(circle, rgba(180,170,210,0.28) 1.5px, transparent 1.5px);
  background-size: 32px 32px;
}

/* ── Overlay screens ──────────────────────────────────── */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(145deg, #ffecd2 0%, #fcb69f 28%, #a8edea 68%, #fed6e3 100%);
  z-index: 200;
  padding: 20px;
}
.screen.hidden { display: none; }

.card {
  background: rgba(255,255,255,0.93);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: 32px;
  padding: 28px 40px 32px;
  text-align: center;
  box-shadow: 0 28px 72px rgba(0,0,0,0.14), 0 4px 16px rgba(0,0,0,0.07);
  max-width: 460px;
  width: 100%;
  max-height: 94vh;
  overflow-y: auto;
}

/* ── Game title (start/end screens) ──────────────────── */
.game-title {
  font-size: 78px;
  font-weight: 900;
  line-height: 0.95;
  margin-bottom: 10px;
  background: linear-gradient(135deg, #ff6b6b 0%, #ffd93d 30%, #6bcb77 62%, #4d96ff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -2px;
}

.subtitle {
  font-size: 13px;
  color: #aaa;
  margin-bottom: 20px;
  line-height: 1.6;
}

/* ── Buttons ──────────────────────────────────────────── */
.btn {
  border: none;
  border-radius: 50px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  padding: 14px 42px;
  font-family: inherit;
  transition: transform 0.1s, box-shadow 0.1s;
}
.btn:active { transform: scale(0.95) !important; }

.btn-primary {
  background: linear-gradient(135deg, #ff6b6b, #ff8e53);
  color: #fff;
  box-shadow: 0 6px 22px rgba(255,107,107,0.4);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,107,107,0.52); }
.btn-primary:disabled { background:#d0d0d0; box-shadow:none; cursor:default; transform:none !important; }

.btn-ghost {
  background: #f3f3f3;
  color: #666;
  box-shadow: none;
  margin-top: 10px;
  font-size: 15px;
  padding: 11px 32px;
}
.btn-ghost:hover { background: #ebebeb; transform: none; }

/* ── Final score ──────────────────────────────────────── */
.final-score-box { margin: 8px 0 12px; }
.final-score-label {
  font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase; color: #ccc; margin-bottom: 4px;
}
.final-score-val {
  font-size: 68px; font-weight: 900; color: #50c550;
  line-height: 1; font-variant-numeric: tabular-nums; display: inline-block;
}

/* ── Name entry ───────────────────────────────────────── */
.name-row { display: flex; gap: 8px; margin-bottom: 14px; }
.name-row input {
  flex: 1; border: 2px solid #e8e8e8; border-radius: 50px;
  padding: 11px 18px; font-size: 15px; font-family: inherit;
  outline: none; transition: border-color 0.2s;
  user-select: text; -webkit-user-select: text; min-width: 0;
}
.name-row input:focus { border-color: #ff8e53; }
.name-row .btn { padding: 11px 20px; font-size: 14px; flex-shrink: 0; }

/* ── High scores ──────────────────────────────────────── */
.hs-title-bar {
  font-size: 11px; font-weight: 800; letter-spacing: 3px;
  text-transform: uppercase; color: #ccc; margin: 4px 0 12px; position: relative;
}
.hs-title-bar::before, .hs-title-bar::after {
  content: ''; position: absolute; top: 50%; width: 20%; height: 1px; background: #ececec;
}
.hs-title-bar::before { left: 0; }
.hs-title-bar::after  { right: 0; }

.hs-section { text-align: left; }
.hs-empty   { text-align: center; color: #bbb; font-size: 13px; padding: 6px 0; }
.hs-table   { width: 100%; border-collapse: collapse; }
.hs-table tr { border-bottom: 1px solid #f2f2f2; }
.hs-table tr:last-child { border-bottom: none; }
.hs-table td { padding: 7px 6px; font-size: 14px; color: #444; }
.hs-rank { width: 32px; font-weight: 800; font-size: 13px; color: #ddd; }
.rank-1 { color: #f5c518; } .rank-2 { color: #aaa; } .rank-3 { color: #cd8b5a; }
.hs-name { font-weight: 500; }
.hs-pts  { font-weight: 800; color: #50c550; text-align: right; font-variant-numeric: tabular-nums; }
.hs-new  { background: rgba(80,197,80,0.09); border-radius: 8px; }

/* ══════════════════════════════════════════════════════
   GAME WRAP — centered column that holds HUD + arena
   ══════════════════════════════════════════════════════ */
#game-wrap {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}
#game-wrap.hidden { display: none; }

/* ══════════════════════════════════════════════════════
   GAME HUD  — glass panel with large gradient title
   ══════════════════════════════════════════════════════ */
#hud {
  position: relative;
  width: 100%;
  max-width: 460px;
  z-index: 100;
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
  border-bottom: 1px solid rgba(220,220,240,0.6);
  border-radius: 0 0 18px 18px;
  box-shadow: 0 4px 28px rgba(0,0,0,0.08);
}

/* Big title row */
.hud-title {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: -0.5px;
  text-align: center;
  padding: 10px 0 2px;
  line-height: 1;
  background: linear-gradient(90deg, #ff6b6b 0%, #ffd93d 30%, #6bcb77 65%, #4d96ff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Stats row */
.hud-stats {
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
}

.stat { text-align: center; }
.stat-label {
  font-size: 9px; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase; color: #bbb; margin-bottom: 1px;
}
.stat-num {
  font-size: 34px; font-weight: 800; line-height: 1;
  display: inline-block; font-variant-numeric: tabular-nums;
}
#score-num { color: #50c550; }

/* Level badge */
.lvl-badge {
  font-size: 13px; font-weight: 800; letter-spacing: 1.5px;
  padding: 5px 18px; border-radius: 20px; display: inline-block;
  transition: background 0.5s, color 0.5s;
}
.lvl-1 { background: rgba(80,197,80,0.15);  color: #50c550; }
.lvl-2 { background: rgba(240,160,48,0.15); color: #f0a030; }
.lvl-3 { background: rgba(232,80,80,0.15);  color: #e85050; }

/* Miss counter */
.miss-block { text-align: center; }
.miss-fraction { display: flex; align-items: baseline; justify-content: center; gap: 1px; }
#miss-num {
  font-size: 34px; font-weight: 800; line-height: 1;
  font-variant-numeric: tabular-nums; color: #e85050; display: inline-block;
}
.miss-denom { font-size: 16px; font-weight: 700; color: #ddd; line-height: 1; margin-left: 2px; }

/* Bomb lives */
.bomb-block { text-align: center; }
.bomb-lives { display: flex; gap: 5px; justify-content: center; font-size: 22px; line-height: 1; padding-top: 2px; }
.bl { transition: filter 0.25s, transform 0.25s; display: inline-block; }
.bl.dead { filter: grayscale(1) opacity(0.28); transform: scale(0.75); }

/* Miss health bar */
#bar-wrap { height: 5px; background: rgba(0,0,0,0.06); }
#bar { height: 100%; width: 100%; background: #50c550; transition: width 0.35s ease-out, background 0.4s; }

/* ══════════════════════════════════════════════════════
   ARENA  — dot-grid background
   ══════════════════════════════════════════════════════ */
#arena {
  position: relative;
  flex: 1;
  width: 100%;
  max-width: 460px;
  overflow: hidden;
  background-color: #fafafd;
  background-image: radial-gradient(circle, rgba(180,170,210,0.28) 1.5px, transparent 1.5px);
  background-size: 32px 32px;
}

/* ── Level-up banner ──────────────────────────────────── */
.level-banner {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 58px; font-weight: 900; text-align: center;
  pointer-events: none; z-index: 60; white-space: nowrap;
  text-shadow: 0 4px 24px rgba(0,0,0,0.12); letter-spacing: -1px;
}

/* ══════════════════════════════════════════════════════
   BUBBLES
   ══════════════════════════════════════════════════════ */
.circle {
  position: absolute; border-radius: 50%; cursor: pointer;
  overflow: hidden;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.07);
  animation: pop-in 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
.circle::before {
  content: ''; position: absolute; top: 10%; left: 20%;
  width: 32%; height: 20%; background: rgba(255,255,255,0.55);
  border-radius: 50%; filter: blur(3px); pointer-events: none;
}
.circle.hit  { animation: pop-out-hit  0.24s ease-out forwards; pointer-events: none; }
.circle.miss { animation: pop-out-miss 0.28s ease-in  forwards; pointer-events: none; }

/* ══════════════════════════════════════════════════════
   BOMBS
   ══════════════════════════════════════════════════════ */
.bomb {
  position: absolute; border-radius: 50%; cursor: pointer;
  overflow: visible;                        /* fuse extends above */
  background: radial-gradient(circle at 38% 32%, #56566e, #14141e);
  box-shadow:
    0 0 0 2px rgba(232,80,80,0.25),
    0 0 18px rgba(232,80,80,0.45),
    0 0 40px rgba(232,80,80,0.15),
    0 8px 24px rgba(0,0,0,0.55);
  animation: pop-in 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  display: flex; align-items: center; justify-content: center;
}

/* pulsing red ring */
.bomb::after {
  content: ''; position: absolute; inset: -4px;
  border-radius: 50%; border: 2px solid rgba(232,80,80,0.45);
  animation: bomb-ring 1.1s ease-in-out infinite;
  pointer-events: none;
}
@keyframes bomb-ring {
  0%,100% { transform: scale(1);    opacity: 0.5; }
  50%      { transform: scale(1.12); opacity: 1;   }
}

.bomb.hit    { animation: bomb-explode 0.28s ease-out forwards; pointer-events: none; }
.bomb.dodged { animation: pop-out-miss 0.28s ease-in  forwards; pointer-events: none; }

@keyframes bomb-explode {
  0%   { transform: scale(1);    opacity: 1; filter: brightness(1); }
  35%  { transform: scale(1.5);  opacity: 0.8; filter: brightness(2.5) saturate(0); }
  100% { transform: scale(0.1);  opacity: 0; }
}

/* fuse */
.bomb-fuse {
  position: absolute; bottom: 100%; left: 50%;
  transform: translateX(-30%) rotate(-18deg);
  transform-origin: bottom center;
  width: 4px; height: 18px;
  background: linear-gradient(to top, #555, #888 60%, transparent);
  border-radius: 3px;
  pointer-events: none;
}
.bomb-fuse::after {
  content: ''; position: absolute; top: -7px; left: 50%;
  transform: translateX(-50%);
  width: 9px; height: 9px; border-radius: 50%;
  background: radial-gradient(circle, #fff8d0, #ffd93d 55%, #ff8c00);
  box-shadow: 0 0 8px 3px rgba(255,160,0,0.8);
  animation: spark 0.32s ease-in-out infinite alternate;
}
@keyframes spark {
  from { opacity: 0.55; transform: translateX(-50%) scale(0.7); }
  to   { opacity: 1;    transform: translateX(-50%) scale(1.25); box-shadow: 0 0 14px 5px rgba(255,160,0,0.9); }
}

/* X mark inside bomb */
.bomb-x {
  font-weight: 900; color: rgba(255,90,90,0.9); line-height: 1;
  pointer-events: none; position: relative; z-index: 1;
  text-shadow: 0 0 10px rgba(255,60,60,0.6);
}

/* ── Shared animations ────────────────────────────────── */
.timer-svg { position: absolute; inset: 0; pointer-events: none; transform: rotate(-90deg); }

@keyframes pop-in {
  from { transform: scale(0) rotate(-20deg); opacity: 0; }
  to   { transform: scale(1) rotate(0deg);   opacity: 1; }
}
@keyframes pop-out-hit  { to { transform: scale(1.75); opacity: 0; } }
@keyframes pop-out-miss { to { transform: scale(0);    opacity: 0; } }

.particle { position: absolute; pointer-events: none; }
</style>
</head>
<body>

<!-- ── Start screen ──────────────────────────────────── -->
<div id="start-screen" class="screen">
  <div class="card">
    <h1 class="game-title">Bubble<br>Mania</h1>
    <p class="subtitle">Pop bubbles, dodge bombs!<br>10 misses and it's Game Over.</p>
    <div class="hs-title-bar">High Scores</div>
    <div id="hs-start" class="hs-section"></div>
    <br>
    <button id="start-btn" class="btn btn-primary">Play Now</button>
  </div>
</div>

<!-- ── End screen ────────────────────────────────────── -->
<div id="end-screen" class="screen hidden">
  <div class="card">
    <p style="font-size:26px;font-weight:800;color:#e85050;margin-bottom:2px;">Game Over!</p>
    <div class="final-score-box">
      <div class="final-score-label">Your Score</div>
      <div class="final-score-val" id="final-score-val">0</div>
    </div>
    <div class="name-row">
      <input id="player-name" type="text" placeholder="Enter your name" maxlength="24" autocomplete="off">
      <button id="save-btn" class="btn btn-primary">Save Score</button>
    </div>
    <div class="hs-title-bar">High Scores</div>
    <div id="hs-end" class="hs-section"></div>
    <button id="play-again-btn" class="btn btn-ghost">Play Again</button>
  </div>
</div>

<!-- ── Game wrap (centered column) ───────────────────── -->
<div id="game-wrap" class="hidden">

<!-- ── HUD ───────────────────────────────────────────── -->
<div id="hud">
  <div class="hud-title">Bubble Mania</div>
  <div class="hud-stats">
    <div class="stat">
      <div class="stat-label">Score</div>
      <div class="stat-num" id="score-num">0</div>
    </div>
    <div id="lvl-badge" class="lvl-badge lvl-1">LVL 1</div>
    <div class="miss-block">
      <div class="stat-label">Misses</div>
      <div class="miss-fraction">
        <span id="miss-num">0</span>
        <span class="miss-denom">/ 10</span>
      </div>
    </div>
    <div class="bomb-block">
      <div class="stat-label">Bombs</div>
      <div class="bomb-lives" id="bomb-lives">
        <span class="bl" id="bl-0">💣</span>
        <span class="bl" id="bl-1">💣</span>
        <span class="bl" id="bl-2">💣</span>
      </div>
    </div>
  </div>
  <div id="bar-wrap"><div id="bar"></div></div>
</div>

<!-- ── Arena ─────────────────────────────────────────── -->
<div id="arena"></div>

</div><!-- /#game-wrap -->

<script>
// ── DOM ──────────────────────────────────────────────────────
const startScreen  = document.getElementById('start-screen');
const endScreen    = document.getElementById('end-screen');
const gameWrap     = document.getElementById('game-wrap');
const hud          = document.getElementById('hud');
const arena        = document.getElementById('arena');
const scoreEl      = document.getElementById('score-num');
const missEl       = document.getElementById('miss-num');
const barEl        = document.getElementById('bar');
const lvlBadge     = document.getElementById('lvl-badge');
const finalScoreEl = document.getElementById('final-score-val');
const playerNameEl = document.getElementById('player-name');
const startBtn     = document.getElementById('start-btn');
const saveBtn      = document.getElementById('save-btn');
const playAgainBtn = document.getElementById('play-again-btn');
const hsStart      = document.getElementById('hs-start');
const hsEnd        = document.getElementById('hs-end');

// ── Level visuals (speed is continuous — see getSpeedConfig) ─
const LEVELS = [
  { label:'LVL 1', cls:'lvl-1', color:'#50c550', name:'LEVEL 1' },
  { label:'LVL 2', cls:'lvl-2', color:'#f0a030', name:'LEVEL 2' },
  { label:'LVL 3', cls:'lvl-3', color:'#e85050', name:'LEVEL 3' },
];

const MAX_MISSES    = 10;
const MAX_BOMB_HITS = 3;
const SIZE_MIN      = 52;
const SIZE_MAX      = 92;
const HS_KEY        = 'bubbleMania_v1';
const HS_MAX        = 5;

// ── State ────────────────────────────────────────────────────
let score = 0, misses = 0, bombHits = 0, lvlIdx = 0, gameActive = false;
let spawnTimer = null, scoreSaved = false, spawnCount = 0;

// ── Audio (Web Audio API — no external files) ─────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let _audioCtx = null;
function ac() {
  if (!_audioCtx) _audioCtx = new AudioCtx();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

function playPop(freq = 880) {
  const ctx = ac(), t = ctx.currentTime;
  const osc = ctx.createOscillator(), g = ctx.createGain();
  osc.connect(g); g.connect(ctx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, t);
  osc.frequency.exponentialRampToValueAtTime(freq * 1.6, t + 0.06);
  g.gain.setValueAtTime(0.28, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
  osc.start(t); osc.stop(t + 0.18);
}

function playMiss() {
  const ctx = ac(), t = ctx.currentTime;
  const osc = ctx.createOscillator(), g = ctx.createGain();
  osc.connect(g); g.connect(ctx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(340, t);
  osc.frequency.exponentialRampToValueAtTime(140, t + 0.28);
  g.gain.setValueAtTime(0.22, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
  osc.start(t); osc.stop(t + 0.28);
}

function playBomb() {
  const ctx = ac(), t = ctx.currentTime;
  const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.55), ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.8);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const flt = ctx.createBiquadFilter(); flt.type = 'lowpass';
  flt.frequency.setValueAtTime(500, t);
  flt.frequency.exponentialRampToValueAtTime(60, t + 0.45);
  const g = ctx.createGain();
  g.gain.setValueAtTime(1.1, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
  src.connect(flt); flt.connect(g); g.connect(ctx.destination);
  src.start(t); src.stop(t + 0.55);
}

function playLevelUp() {
  const ctx = ac();
  [523, 659, 784, 1047].forEach((freq, i) => {
    const t = ctx.currentTime + i * 0.1;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = freq;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.18, t + 0.04);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.38);
    osc.start(t); osc.stop(t + 0.38);
  });
}

function playGameOver() {
  const ctx = ac();
  [380, 300, 240, 170].forEach((freq, i) => {
    const t = ctx.currentTime + i * 0.17;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = 'sawtooth'; osc.frequency.value = freq;
    g.gain.setValueAtTime(0.18, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.32);
    osc.start(t); osc.stop(t + 0.32);
  });
}

// ── Helpers ──────────────────────────────────────────────────
const rand  = (a, b) => a + Math.random() * (b - a);
const randI = (a, b) => Math.floor(rand(a, b));

function pastel() {
  return `hsl(${randI(0,360)},${randI(60,75)}%,${randI(72,82)}%)`;
}

// ── Smooth speed: increases gradually with every point scored ─
function getSpeedConfig() {
  const f = Math.min(2.6, 1 + score * 0.018);   // 1.8% faster per point, cap ×2.6
  return {
    spawnMin: Math.max(140, Math.round(480 / f)),
    spawnMax: Math.max(280, Math.round(1000 / f)),
    lifetime: Math.max(780, Math.round(1500 / f)),
  };
}

// ── Bomb frequency: starts 1 per 10, shrinks by 1 per 10 pts ─
function getBombInterval() {
  return Math.max(5, 10 - Math.floor(score / 10));
}

// ── Animations ───────────────────────────────────────────────
function punchEl(el) {
  el.animate(
    [{ transform:'scale(1)' }, { transform:'scale(1.5)' }, { transform:'scale(1)' }],
    { duration: 240, easing: 'ease-out' }
  );
}

function shakeEl(el) {
  el.animate(
    [
      { transform:'translateX(0)'    },
      { transform:'translateX(-8px)' },
      { transform:'translateX(7px)'  },
      { transform:'translateX(-5px)' },
      { transform:'translateX(0)'    },
    ],
    { duration: 300, easing: 'ease-out' }
  );
}

function flashRed(strength = 0.18) {
  const f = document.createElement('div');
  f.style.cssText = `position:fixed;inset:0;z-index:150;background:rgba(232,80,80,${strength});pointer-events:none;`;
  document.body.appendChild(f);
  f.animate([{ opacity:1 }, { opacity:0 }], { duration: 400, easing:'ease-out', fill:'forwards' })
   .onfinish = () => f.remove();
}

// ── Bubble click burst ────────────────────────────────────────
function clickBurst(cx, cy, color) {
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2 + rand(-0.2, 0.2);
    const dist  = rand(50, 105);
    const sz    = rand(6, 15);
    const tx    = Math.cos(angle) * dist;
    const ty    = Math.sin(angle) * dist;
    const d     = document.createElement('div');
    d.className = 'particle';
    d.style.cssText = `width:${sz}px;height:${sz}px;background:${color};border-radius:50%;left:${cx-sz/2}px;top:${cy-sz/2}px;`;
    arena.appendChild(d);
    d.animate(
      [
        { transform:'translate(0,0) scale(1)',                 opacity:0.92 },
        { transform:`translate(${tx}px,${ty}px) scale(0.08)`, opacity:0    },
      ],
      { duration:rand(380,520), easing:'ease-out', fill:'forwards' }
    ).onfinish = () => d.remove();
  }
}

// ── Bomb explosion burst (dark + fire) ───────────────────────
function bombBurst(cx, cy) {
  const colors = ['#222','#444','#e85050','#ff7733','#ffaa00','#333'];
  for (let i = 0; i < 16; i++) {
    const angle  = (i / 16) * Math.PI * 2 + rand(-0.15, 0.15);
    const dist   = rand(55, 130);
    const sz     = rand(5, 16);
    const isRect = Math.random() > 0.5;
    const color  = colors[randI(0, colors.length)];
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    const d = document.createElement('div');
    d.className = 'particle';
    d.style.cssText = `width:${sz}px;height:${sz}px;background:${color};border-radius:${isRect?'2px':'50%'};left:${cx-sz/2}px;top:${cy-sz/2}px;`;
    arena.appendChild(d);
    d.animate(
      [
        { transform:`translate(0,0) scale(1) rotate(0deg)`,                    opacity:0.95 },
        { transform:`translate(${tx}px,${ty}px) scale(0.08) rotate(${rand(-180,180)}deg)`, opacity:0 },
      ],
      { duration:rand(350,550), easing:'ease-out', fill:'forwards', delay:rand(0,60) }
    ).onfinish = () => d.remove();
  }
}

// ── Level-up confetti ─────────────────────────────────────────
const CONFETTI = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff9f43','#ff6eb4','#00cec9'];

function confettiBurst() {
  const aW = arena.clientWidth, aH = arena.clientHeight;
  for (let i = 0; i < 70; i++) {
    const color  = CONFETTI[randI(0, CONFETTI.length)];
    const sz     = rand(6, 16);
    const isRect = Math.random() > 0.45;
    const h      = isRect ? sz * rand(0.4, 1.8) : sz;
    const tx = rand(-220, 220), ty = rand(-220, 220), rot = rand(-300, 300);
    const d = document.createElement('div');
    d.style.cssText = `position:absolute;width:${sz}px;height:${h}px;background:${color};border-radius:${isRect?'3px':'50%'};left:${rand(0.1,0.9)*aW-sz/2}px;top:${rand(0.1,0.9)*aH-h/2}px;pointer-events:none;z-index:45;`;
    arena.appendChild(d);
    d.animate(
      [
        { transform:`translate(0,0) scale(1) rotate(0deg)`,                    opacity:1 },
        { transform:`translate(${tx}px,${ty}px) scale(0.15) rotate(${rot}deg)`, opacity:0 },
      ],
      { duration:rand(650,1100), easing:'ease-out', fill:'forwards', delay:rand(0,180) }
    ).onfinish = () => d.remove();
  }
}

function showLevelBanner(idx) {
  const cfg = LEVELS[idx];
  const b = document.createElement('div');
  b.className = 'level-banner';
  b.style.color = cfg.color;
  b.textContent = cfg.name;
  arena.appendChild(b);
  b.animate(
    [
      { transform:'translate(-50%,-50%) scale(0.25)', opacity:0   },
      { transform:'translate(-50%,-50%) scale(1.18)', opacity:1, offset:0.28 },
      { transform:'translate(-50%,-50%) scale(1)',    opacity:1, offset:0.60 },
      { transform:'translate(-50%,-50%) scale(1.06)', opacity:0              },
    ],
    { duration:1900, easing:'ease-out', fill:'forwards' }
  ).onfinish = () => b.remove();
}

function levelUp(newIdx) {
  lvlIdx = newIdx;
  lvlBadge.textContent = LEVELS[lvlIdx].label;
  lvlBadge.className   = `lvl-badge ${LEVELS[lvlIdx].cls}`;
  showLevelBanner(newIdx);
  confettiBurst();
  playLevelUp();
}

// ── Miss bar ──────────────────────────────────────────────────
function updateBar() {
  const pct = ((MAX_MISSES - misses) / MAX_MISSES) * 100;
  barEl.style.width = pct + '%';
  if      (misses >= 8) barEl.style.background = '#e85050';
  else if (misses >= 5) barEl.style.background = '#f0a030';
  else                  barEl.style.background = '#50c550';
}

// ── Add a bubble miss ─────────────────────────────────────────
function addMiss() {
  misses++;
  missEl.textContent = misses;
  shakeEl(missEl);
  flashRed(0.18);
  playMiss();
  updateBar();
  if (misses >= MAX_MISSES) endGame();
}

// ── Add a bomb hit (separate from bubble misses) ──────────────
function addBombHit() {
  bombHits++;
  const el = document.getElementById(`bl-${bombHits - 1}`);
  if (el) el.classList.add('dead');
  shakeEl(document.getElementById('bomb-lives'));
  flashRed(0.38);
  playBomb();
  if (bombHits >= MAX_BOMB_HITS) endGame();
}

// ── High scores (in-memory, synced to localStorage) ───────────
let _scores = [];
(function () {
  try { const d = JSON.parse(localStorage.getItem(HS_KEY)); if (Array.isArray(d)) _scores = d; } catch {}
})();

function loadScores() { return _scores; }

function saveScore(name, pts) {
  const entry = { name: (name.trim() || 'Anonymous'), score: pts };
  _scores.push(entry);
  _scores.sort((a, b) => b.score - a.score);
  const newIdx = _scores.indexOf(entry);
  _scores = _scores.slice(0, HS_MAX);
  try { localStorage.setItem(HS_KEY, JSON.stringify(_scores)); } catch {}
  return newIdx < HS_MAX ? newIdx : -1;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderScores(container, highlightIdx = -1) {
  const list = loadScores();
  if (!list.length) {
    container.innerHTML = '<p class="hs-empty">No scores yet — be the first!</p>';
    return;
  }
  const rankLabel = (i) => ['#1','#2','#3'][i] || '#' + (i + 1);
  const rankCls   = (i) => ['rank-1','rank-2','rank-3'][i] || '';
  const rows = list.map((e, i) => `
    <tr class="${i === highlightIdx ? 'hs-new' : ''}">
      <td class="hs-rank ${rankCls(i)}">${rankLabel(i)}</td>
      <td class="hs-name">${esc(e.name)}</td>
      <td class="hs-pts">${e.score}</td>
    </tr>`).join('');
  container.innerHTML = `<table class="hs-table">${rows}</table>`;
}

// ── Level check (score-based, visual milestones) ──────────────
function checkLevel() {
  const newIdx = score >= 40 ? 2 : score >= 20 ? 1 : 0;
  if (newIdx > lvlIdx) levelUp(newIdx);
}

// ── SVG timer ring helper ─────────────────────────────────────
function buildTimerRing(parent, size, strokeColor) {
  const r    = size / 2 - 2;
  const circ = +(2 * Math.PI * r).toFixed(3);
  const NS   = 'http://www.w3.org/2000/svg';
  const svg  = document.createElementNS(NS, 'svg');
  svg.setAttribute('class', 'timer-svg');
  svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
  const arc = document.createElementNS(NS, 'circle');
  arc.setAttribute('cx', size / 2); arc.setAttribute('cy', size / 2);
  arc.setAttribute('r', r);
  arc.setAttribute('fill', 'none');
  arc.setAttribute('stroke', strokeColor);
  arc.setAttribute('stroke-width', '3.5');
  arc.setAttribute('stroke-linecap', 'round');
  arc.setAttribute('stroke-dasharray', circ);
  arc.setAttribute('stroke-dashoffset', '0');
  svg.appendChild(arc);
  parent.appendChild(svg);
  return { arc, circ };
}

// ── Spawn bubble ──────────────────────────────────────────────
function spawnBubble() {
  const cfg   = getSpeedConfig();
  const size  = Math.round(rand(SIZE_MIN, SIZE_MAX));
  const aW = arena.clientWidth, aH = arena.clientHeight;
  const x = rand(0, aW - size), y = rand(0, aH - size);
  const color = pastel();

  const el = document.createElement('div');
  el.className = 'circle';
  el.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px;background:${color};`;

  const { arc, circ } = buildTimerRing(el, size, 'rgba(255,255,255,0.65)');
  let done = false;

  el.addEventListener('click', () => {
    if (done || !gameActive) return;
    done = true;
    clearTimeout(expireId);
    score++;
    scoreEl.textContent = score;
    punchEl(scoreEl);
    checkLevel();
    clickBurst(x + size / 2, y + size / 2, color);
    playPop(600 + Math.random() * 500);
    el.classList.add('hit');
    setTimeout(() => el.remove(), 280);
  });

  arena.appendChild(el);
  arc.animate(
    [{ strokeDashoffset:'0' }, { strokeDashoffset:String(circ) }],
    { duration:cfg.lifetime, easing:'linear', fill:'forwards' }
  );

  const expireId = setTimeout(() => {
    if (done || !gameActive) return;
    done = true;
    el.classList.add('miss');
    setTimeout(() => el.remove(), 320);
    addMiss();
  }, cfg.lifetime);
}

// ── Spawn bomb ────────────────────────────────────────────────
function spawnBomb() {
  const cfg  = getSpeedConfig();
  const size = Math.round(rand(SIZE_MIN + 4, SIZE_MAX));
  const aW = arena.clientWidth, aH = arena.clientHeight;
  const x = rand(0, aW - size), y = rand(size * 0.3, aH - size); // avoid top edge (fuse space)

  const el = document.createElement('div');
  el.className = 'bomb';
  el.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px;`;

  // Fuse
  const fuse = document.createElement('div');
  fuse.className = 'bomb-fuse';
  el.appendChild(fuse);

  // X mark
  const xMark = document.createElement('div');
  xMark.className = 'bomb-x';
  xMark.style.fontSize = Math.round(size * 0.34) + 'px';
  xMark.textContent = '✕';
  el.appendChild(xMark);

  // Timer ring (red tint)
  const { arc, circ } = buildTimerRing(el, size, 'rgba(255,80,80,0.55)');
  let done = false;

  el.addEventListener('click', () => {
    if (done || !gameActive) return;
    done = true;
    clearTimeout(expireId);
    bombBurst(x + size / 2, y + size / 2);
    el.classList.add('hit');
    setTimeout(() => el.remove(), 320);
    addBombHit();
  });

  arena.appendChild(el);
  arc.animate(
    [{ strokeDashoffset:'0' }, { strokeDashoffset:String(circ) }],
    { duration:cfg.lifetime, easing:'linear', fill:'forwards' }
  );

  const expireId = setTimeout(() => {
    if (done || !gameActive) return;
    done = true;
    el.classList.add('dodged');  // no penalty — you avoided it
    setTimeout(() => el.remove(), 320);
  }, cfg.lifetime);
}

// ── Spawn entity ──────────────────────────────────────────────
function spawnEntity() {
  spawnCount++;
  if (spawnCount % getBombInterval() === 0) {
    spawnBomb();
  } else {
    spawnBubble();
  }
}

function scheduleSpawn() {
  if (!gameActive) return;
  spawnEntity();
  const cfg = getSpeedConfig();
  spawnTimer = setTimeout(scheduleSpawn, rand(cfg.spawnMin, cfg.spawnMax));
}

// ── Game lifecycle ────────────────────────────────────────────
function startGame() {
  score = 0; misses = 0; bombHits = 0; lvlIdx = 0; spawnCount = 0;
  gameActive = true; scoreSaved = false;

  scoreEl.textContent    = 0;
  missEl.textContent     = 0;
  barEl.style.width      = '100%';
  barEl.style.background = '#50c550';
  lvlBadge.textContent   = 'LVL 1';
  lvlBadge.className     = 'lvl-badge lvl-1';
  playerNameEl.value     = '';
  saveBtn.disabled       = false;
  saveBtn.textContent    = 'Save Score';
  for (let i = 0; i < MAX_BOMB_HITS; i++) {
    const bl = document.getElementById(`bl-${i}`);
    if (bl) bl.classList.remove('dead');
  }

  startScreen.classList.add('hidden');
  endScreen.classList.add('hidden');
  gameWrap.classList.remove('hidden');

  scheduleSpawn();
}

function endGame() {
  gameActive = false;
  clearTimeout(spawnTimer);
  spawnTimer = null;
  playGameOver();

  arena.querySelectorAll('.circle, .bomb').forEach(el => {
    el.style.pointerEvents = 'none';
    el.classList.add('miss');
    setTimeout(() => el.remove(), 350);
  });

  setTimeout(() => {
    gameWrap.classList.add('hidden');
    finalScoreEl.textContent = score;
    renderScores(hsEnd);
    endScreen.classList.remove('hidden');
    playerNameEl.focus();
  }, 420);
}

// ── Save score ────────────────────────────────────────────────
function handleSave() {
  if (scoreSaved) return;
  scoreSaved = true;
  saveBtn.disabled    = true;
  saveBtn.textContent = 'Saved!';
  const newIdx = saveScore(playerNameEl.value, score);
  renderScores(hsEnd, newIdx);
  renderScores(hsStart);
}

// ── Events ────────────────────────────────────────────────────
startBtn.addEventListener('click', startGame);
playAgainBtn.addEventListener('click', startGame);
saveBtn.addEventListener('click', handleSave);
playerNameEl.addEventListener('keydown', e => { if (e.key === 'Enter') handleSave(); });

// ── Boot ──────────────────────────────────────────────────────
renderScores(hsStart);
</script>
